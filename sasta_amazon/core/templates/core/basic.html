{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
    <title>{% block title %} {% endblock %}</title>
</head>

<body>

    <header>
        <div class="navbar">

            <div class="logo">
                <a class="logo" href="/">Sasta Amazon</a>
            </div>

            <div class="nav-links">
                <a href="{% url 'home' %}" class="{% if request.path == '/' %} active {% endif %}">Home</a>
                <a href="{% url 'shop' %}" class="{% if request.resolver_match.url_name == 'shop' %} active {% endif %}">Shop</a>
                <a href="{% url 'cart' %}" class="cart-btn">
                    <img src="{% static 'core/images/cart.png' %}" class="cart-icon" alt="cart">Cart
                    <span class="cart-count" id="cart">0</span>
                </a>
                {% if request.user.is_authenticated %}
                <a href="{% url 'user' %}" class="user-btn">
                    <img src="{% static 'core/images/user.png' %}" class="user-icon" alt="login">
                    {{request.user.username}}
                </a>
                {% else %}
                <a href="{% url 'login' %}" class="login-btn">
                    <img src="{% static 'core/images/user.png' %}" class="login-icon" alt="login">
                    Login
                </a>
                {% endif %}
            </div>

        </div>
    </header>

    <main>

        {% block body %} {% endblock %}
        
    </main>

    <footer>
        <p>© 2026 Sasta Amazon. All Rights Reserved.</p>
    </footer>
</body>

</html>
